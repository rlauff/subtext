<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtext Sandbox</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 40px auto; 
            max-width: 800px; 
        }
        #examples-container {
            margin-bottom: 10px;
        }
        #examples-container button {
            margin-right: 5px;
            padding: 5px 10px;
            cursor: pointer;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        #examples-container button:hover {
            background-color: #e0e0e0;
        }
        textarea { 
            width: 100%; 
            font-family: monospace; 
            font-size: 14px; 
            padding: 10px;
            box-sizing: border-box; 
            resize: vertical; 
        }
        #terminal { 
            background: #1e1e1e; 
            color: #4af626; 
            padding: 15px; 
            min-height: 250px;
            font-family: monospace;
            white-space: pre-wrap; 
            box-sizing: border-box;
            border-radius: 4px;
        }
        #run-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>Subtext Interpreter Sandbox</h2>
    
    <div id="examples-container">
        <strong style="margin-right: 10px;">Try an example:</strong>
        </div>

    <textarea id="code-input" rows="12">// Write your subtext code here...</textarea>
    <br>
    <button id="run-btn">Run Code</button>

    <h3>Terminal:</h3>
    <div id="terminal"></div>

    <script type="module">
        import init, { run_wasm } from './pkg/subtext.js';

        // 1. Global print function for the Rust macro
        window.subtextPrint = function(text) {
            console.log("-> Rust möchte etwas ausgeben:", text);
            const terminal = document.getElementById('terminal');
            terminal.textContent += text + '\n';
        };

        // 2. Define your examples here (WITHOUT the .st extension)
        const exampleFiles = ["binary_increment", "compare", "turing", "fibonacci", "memory_example"];

        function setupExampleButtons() {
            const container = document.getElementById('examples-container');
            const codeInput = document.getElementById('code-input');

            exampleFiles.forEach(fileName => {
                const btn = document.createElement('button');
                btn.textContent = fileName;

                btn.addEventListener('click', async () => {
                    try {
                        const response = await fetch(`examples/${fileName}.stx`);
                        
                        if (!response.ok) {
                            throw new Error(`Server returned ${response.status}: Could not find ${fileName}.stx`);
                        }
                        
                        const codeText = await response.text();
                        codeInput.value = codeText;
                        document.getElementById('terminal').textContent = ''; 
                        
                    } catch (error) {
                        window.subtextPrint(`\nError loading example: ${error.message}`);
                    }
                });

                container.appendChild(btn);
            });
        }

        async function start() {
            // Initialize WebAssembly
            await init();

            // Set up example buttons
            setupExampleButtons();

            const runBtn = document.getElementById('run-btn');
            const codeInput = document.getElementById('code-input');
            const terminal = document.getElementById('terminal');

            // Set up execution
            runBtn.addEventListener('click', () => {
                console.log("1. Button wurde geklickt!");
                terminal.textContent = ''; 
                const code = codeInput.value;
                console.log("2. Eingelesener Code lautet:\n", code);

                try {
                    console.log("3. Übergebe Code an WebAssembly...");
                    run_wasm(code);
                    console.log("4. WebAssembly ist fertig durchgelaufen.");
                } catch (e) {
                    console.error("5. Fehler beim Ausführen gefangen:", e);
                    window.subtextPrint(`\nCritical WebAssembly Error: ${e}`);
                }
            });
        }

        // Run setup
        start();
    </script>
</body>
</html>
